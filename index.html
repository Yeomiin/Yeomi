<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEOMI</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#fff;
    text-align:center;
}

header{
    background:#000;
    color:white;
    padding:20px;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.hero{
    padding:50px 20px;
}

.btn{
    display:inline-block;
    background:#000;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:8px;
    margin-top:15px;
}

.products{
    padding:40px 20px;
}

.product{
    border:1px solid #ddd;
    padding:15px;
    margin:15px auto;
    max-width:300px;
    border-radius:10px;
}

footer{
    background:#f5f5f5;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <div class="logo">YEOMI</div>
    <p>Fashion Jewelry Store</p>
</header>

<section class="hero">
    <h1>Welcome to YEOMI</h1>
    <p>Beautiful Earrings & Fashion Accessories</p>
    <a href="https://instagram.com/yeomi.in.1" class="btn">Follow on Instagram</a>
</section>

<section class="products">
    <h2>Our Collection</h2>

    <div class="product">
        <h3>Premium Earrings</h3>
        <p>Stylish & Trendy Design</p>
    </div>

    <div class="product">
        <h3>Fashion Jewelry</h3>
        <p>Perfect for Daily Wear</p>
    </div>
</section>

<footer>
    <p>Instagram: @yeomi.in.1</p>
    <p>© 2026 YEOMI. All Rights Reserved.</p>
</footer>

</body>
</html>
