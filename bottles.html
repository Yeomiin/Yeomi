<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Bottles Collection | YEOMI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-soft-pink: #FFF0F2;
            --premium-cream: #FFFDFD;
            --text-charcoal: #3A3233;
            --accent-rose: #E29CA7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-soft-pink);
            color: var(--text-charcoal);
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(226, 156, 167, 0.08);
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-charcoal);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .brand-logo-img {
            height: 45px;
            border-radius: 50px;
        }

        .container {
            padding: 40px 5%;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }

        .page-subtitle {
            text-align: center;
            color: #706566;
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--premium-cream);
            border-radius: 12px;
            border: 1px solid rgba(226, 156, 167, 0.15);
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .image-box {
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: #fff;
            border-radius: 8px;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-meta {
            padding: 15px 5px 5px;
            text-align: center;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #A66E76;
            margin-bottom: 12px;
        }

        .order-btn {
            display: inline-block;
            background: #FCE4E6;
            color: #A66E76;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 15px;
            border-radius: 20px;
            text-transform: uppercase;
            transition: all 0.3s;
            border: 1px solid rgba(226, 156, 167, 0.3);
        }

        .order-btn:hover {
            background: var(--accent-rose);
            color: white;
        }

        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr); /* Mobile par 2 columns */
                gap: 12px;
            }
            .product-name { font-size: 15px; }
            .product-price { font-size: 14px; }
            .image-box { height: 180px; }
        }
    </style>
</head>
<body>

    <!-- Header with Back Button -->
    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
        <img src="IMG_6376.jpg.PNG" alt="YEOMI Logo" class="brand-logo-img" onerror="this.src='https://via.placeholder.com/100x45/fff/e29ca7?text=YEOMI'">
        <div style="width: 50px;"></div> <!-- Balance spacing -->
    </header>

    <div class="container">
        <h1 class="page-title">Aesthetic Bottles</h1>
        <p class="page-subtitle">Stay hydrated with our cutest collection of pastel and aesthetic bottles!</p>

        <div class="product-grid">
            
            <!-- Bottle Item 1 -->
            <div class="product-card">
                <div class="image-box">
                    <!-- Yahan apni botal ki photo ka naam likhein -->
                    <img src="botal1.jpeg" alt="Cute Pastel Bottle" onerror="this.src='https://via.placeholder.com/250x280/fff/e29ca7?text=Cute+Bottle'">
                </div>
                <div class="product-meta">
                    <h3 class="product-name">Pastel Macaron Bottle</h3>
                    <div class="product-price">₹399</div>
                    <a href="https://wa.me/919413554253?text=Hi%20YEOMI,%20I%20want%20to%20order%20Pastel%20Macaron%20Bottle" target="_blank" class="order-btn">Buy Now</a>
                </div>
            </div>

            <!-- Bottle Item 2 -->
            <div class="product-card">
                <div class="image-box">
                    <img src="botal2.jpeg" alt="Bear Straw Bottle" onerror="this.src='https://via.placeholder.com/250x280/fff/e29ca7?text=Bear+Bottle'">
                </div>
                <div class="product-meta">
                    <h3 class="product-name">Kawaii Bear Straw Bottle</h3>
                    <div class="product-price">₹499</div>
                    <a href="https://wa.me/919413554253?text=Hi%20YEOMI,%20I%20want%20to%20order%20Kawaii%20Bear%20Bottle" target="_blank" class="order-btn">Buy Now</a>
                </div>
            </div>

            <!-- Aap isi tarah niche aur cards jod sakte hain... -->

        </div>
    </div>

</body>
</html>
